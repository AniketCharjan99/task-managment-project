spring.application.name=auth-service


# Server
server.port=8081
# ===============================
# = MySQL Database Connection
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/task_managment
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / Hibernate
# ===============================

spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.ddl-auto=create-drop   ? use this only for testing

# Show SQL queries in console (very useful while learning)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = Optional - better logging
# ===============================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# logging.level.org.springframework.jdbc=DEBUG